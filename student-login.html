<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | UniVea</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <header>
        <h1>Student Login</h1>
    </header>

    <main>
        <form id="loginForm">
            <label class="required-field">Email</label><br>
            <input type="email" id="email" placeholder="Enter your email" required><br><br>

            <label class="required-field">Password</label><br>
            <input type="password" id="password" placeholder="Enter your password" required><br><br>

            <div class="forgot-password">
                <a href="../auth/forgot-password.html">Forgot Password?</a>
            </div><br>

            <button type="submit">Login</button>
        </form>

        <p>
            New student?
            <a href="student-register.html">Register here</a>
        </p>
    </main>

</body>
</html>
