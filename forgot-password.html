<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | UniVea</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <header>
        <h1>Reset Your Password</h1>
    </header>

    <main>
        <form id="resetPasswordForm">
            <p>Enter your email address and we'll send you a password reset link.</p><br>

            <label class="required-field">Email Address</label><br>
            <input type="email" id="resetEmail" placeholder="Enter your registered email" required><br><br>

            <button type="submit">Send Reset Link</button>
        </form>

        <div class="back-to-login">
            <a href="../index.html">← Back to Home</a>
        </div>
        <br>
        <p>
            Need help?
            <a href="../pages/contact.html">Contact Support</a>
        </p>
    </main>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            
            // Simple implementation - backend will determine user type
            alert(`Reset link sent to ${email}. Please check your email.`);
            
            // Redirect to home
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 2000);
        });
    </script>

</body>
</html>
