<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration | UniVea</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <header>
        <h1>Student Registration</h1>
        <p>Create your account to access campus services</p>
    </header>

    <main>
        <form id="studentRegisterForm">
            <!-- Personal Information -->
            <label class="required-field">Full Name</label><br>
            <input type="text" placeholder="Enter your full name" required><br><br>

            <label class="required-field">Email Address</label><br>
            <input type="email" placeholder="Enter your email" required><br><br>

            <label class="required-field">Phone Number</label><br>
            <input type="tel" placeholder="Enter your phone number" required><br><br>

            <!-- Student Information -->
            <label class="required-field">University/College</label><br>
            <input type="text" placeholder="Enter your university name" required><br><br>

            <label class="required-field">Course/Program</label><br>
            <input type="text" placeholder="e.g. B.Tech Computer Science" required><br><br>

            <label class="required-field">Year of Study</label><br>
            <select required>
                <option value="">Select year</option>
                <option value="1">First Year</option>
                <option value="2">Second Year</option>
                <option value="3">Third Year</option>
                <option value="4">Fourth Year</option>
                <option value="5">Fifth Year</option>
                <option value="postgrad">Post Graduate</option>
            </select><br><br>

            <label class="required-field">Student ID Number</label><br>
            <input type="text" placeholder="Enter your student ID" required><br><br>

            <!-- Location -->
            <label class="required-field">Current Address</label><br>
            <textarea placeholder="Enter your current address for service matching" rows="3" required></textarea><br><br>

            <!-- Security -->
            <label class="required-field">Create Password</label><br>
            <input type="password" placeholder="Create a strong password" required><br><br>

            <label class="required-field">Confirm Password</label><br>
            <input type="password" placeholder="Re-enter your password" required><br><br>

            <!-- Terms and Conditions -->
            <div class="checkbox-container">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    I agree to the <a href="../pages/terms.html" target="_blank">Terms & Conditions</a> and <a href="../pages/privacy.html" target="_blank">Privacy Policy</a>
                </label>
            </div><br>

            <div class="checkbox-container">
                <input type="checkbox" id="updates">
                <label for="updates">
                    I want to receive updates about new services and offers
                </label>
            </div><br>

            <button type="submit">Create Account</button>
        </form>

        <p>
            Already have an account?
            <a href="student-login.html">Login here</a>
        </p>
    </main>

    <script>
        document.getElementById('studentRegisterForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Basic password match validation
            const password = this.querySelector('input[type="password"]:first-of-type').value;
            const confirmPassword = this.querySelector('input[type="password"]:last-of-type').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters long!');
                return;
            }
            
            // Here you would typically make an API call to register
            alert('Registration successful! Please check your email for verification.');
            
            // Redirect to login page
            setTimeout(() => {
                window.location.href = 'student-login.html';
            }, 2000);
        });
    </script>

</body>
</html>
